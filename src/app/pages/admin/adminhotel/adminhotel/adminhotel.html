<div class="flex min-h-screen bg-gray-50">
  <app-sidebar></app-sidebar>

  <div class="flex-1 p-8">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold text-gray-800">Manage Hotels</h1>
        <p class="text-gray-600">Manage hotel partnerships and listings</p>
      </div>
      <button (click)="addHotel()"
              class="px-6 py-3 bg-gradient-to-r from-yellow-500 to-yellow-600 text-blue-900 font-semibold rounded-lg">
        + Add Hotel
      </button>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (hotel of hotels; track hotel.id) {
        <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow">
          <div class="flex justify-between items-start mb-4">
            <div>
              <h3 class="text-xl font-bold text-gray-800">{{ hotel.name }}</h3>
              <p class="text-gray-600 text-sm">{{ hotel.location }}</p>
            </div>
            <span class="text-yellow-500">{{ getStars(hotel.stars) }}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-sm text-gray-600">{{ hotel.rooms }} Rooms</span>
            <span class="px-2 py-1 text-xs font-semibold rounded-full"
                  [class.bg-green-100]="getStatusColor(hotel.status) === 'green'"
                  [class.text-green-800]="getStatusColor(hotel.status) === 'green'"
                  [class.bg-red-100]="getStatusColor(hotel.status) === 'red'"
                  [class.text-red-800]="getStatusColor(hotel.status) === 'red'">
              {{ hotel.status }}
            </span>
          </div>
          <div class="flex space-x-2 mt-4">
            <button (click)="editHotel(hotel)"
                    class="px-3 py-1 text-blue-600 border border-blue-600 rounded hover:bg-blue-50 transition-colors text-sm">
              Edit
            </button>
            <button (click)="deleteHotel(hotel.id)"
                    class="px-3 py-1 text-red-600 border border-red-600 rounded hover:bg-red-50 transition-colors text-sm">
              Delete
            </button>
          </div>
        </div>
      }
    </div>

    <!-- Modal -->
    @if (showModal) {
      <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4">
          <div class="p-6 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-xl font-bold text-gray-800">
              {{ editingHotel ? 'Edit Hotel' : 'Add Hotel' }}
            </h3>
            <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
          </div>
          <div class="p-6">
            <form (ngSubmit)="saveHotel()">
              <div class="space-y-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Hotel Name</label>
                  <input [(ngModel)]="newHotel.name" name="name" type="text"
                         class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                  <input [(ngModel)]="newHotel.location" name="location" type="text"
                         class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Stars</label>
                  <select [(ngModel)]="newHotel.stars" name="stars"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
                    <option [value]="5">★★★★★</option>
                    <option [value]="4">★★★★</option>
                    <option [value]="3">★★★</option>
                    <option [value]="2">★★</option>
                    <option [value]="1">★</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Number of Rooms</label>
                  <input [(ngModel)]="newHotel.rooms" name="rooms" type="number"
                         class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                  <select [(ngModel)]="newHotel.status" name="status"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                  </select>
                </div>
              </div>
              <div class="mt-6 flex justify-end space-x-3">
                <button type="button" (click)="closeModal()"
                        class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                  Cancel
                </button>
                <button type="submit"
                        class="px-6 py-2 bg-gradient-to-r from-yellow-500 to-yellow-600 text-blue-900 font-semibold rounded-lg">
                  {{ editingHotel ? 'Update' : 'Create' }}
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    }
  </div>
</div>
