<div class="flex min-h-screen bg-gray-50">
  <app-sidebar></app-sidebar>

  <div class="flex-1 p-8">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold text-gray-800">Manage Categories</h1>
        <p class="text-gray-600">Organize packages by categories</p>
      </div>
      <button (click)="addCategory()"
              class="px-6 py-3 bg-gradient-to-r from-yellow-500 to-yellow-600 text-blue-900 font-semibold rounded-lg">
        + Add Category
      </button>
    </div>

    <div class="grid md:grid-cols-3 gap-6">
      @for (cat of categories; track cat.id) {
        <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow">
          <div class="flex items-center justify-between mb-4">
            <span class="text-4xl">{{ cat.icon }}</span>
            <span class="px-2 py-1 text-xs font-semibold rounded-full"
                  [class.bg-green-100]="getStatusColor(cat.status) === 'green'"
                  [class.text-green-800]="getStatusColor(cat.status) === 'green'"
                  [class.bg-red-100]="getStatusColor(cat.status) === 'red'"
                  [class.text-red-800]="getStatusColor(cat.status) === 'red'">
              {{ cat.status }}
            </span>
          </div>
          <h3 class="text-xl font-bold text-gray-800">{{ cat.name }}</h3>
          <p class="text-gray-600 text-sm">{{ cat.count }} packages</p>
          <div class="flex space-x-2 mt-4">
            <button (click)="editCategory(cat)"
                    class="px-3 py-1 text-blue-600 border border-blue-600 rounded hover:bg-blue-50 transition-colors text-sm">
              Edit
            </button>
            <button (click)="deleteCategory(cat.id)"
                    class="px-3 py-1 text-red-600 border border-red-600 rounded hover:bg-red-50 transition-colors text-sm">
              Delete
            </button>
          </div>
        </div>
      }
    </div>

    <!-- Modal -->
    @if (showModal) {
      <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4">
          <div class="p-6 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-xl font-bold text-gray-800">
              {{ editingCategory ? 'Edit Category' : 'Add Category' }}
            </h3>
            <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
          </div>
          <div class="p-6">
            <form (ngSubmit)="saveCategory()">
              <div class="space-y-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Category Name</label>
                  <input [(ngModel)]="newCategory.name" name="name" type="text"
                         class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Icon (Emoji)</label>
                  <input [(ngModel)]="newCategory.icon" name="icon" type="text" placeholder="e.g., 🏖️"
                         class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                  <select [(ngModel)]="newCategory.status" name="status"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                  </select>
                </div>
              </div>
              <div class="mt-6 flex justify-end space-x-3">
                <button type="button" (click)="closeModal()"
                        class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                  Cancel
                </button>
                <button type="submit"
                        class="px-6 py-2 bg-gradient-to-r from-yellow-500 to-yellow-600 text-blue-900 font-semibold rounded-lg">
                  {{ editingCategory ? 'Update' : 'Create' }}
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    }
  </div>
</div>
