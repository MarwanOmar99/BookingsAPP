<div class="min-h-screen bg-gray-50">
  <!-- Hero -->
  <section class="relative bg-gradient-to-r from-blue-900 via-blue-800 to-blue-900 py-16">
    <div class="absolute inset-0 overflow-hidden">
      <div class="absolute -top-40 -right-40 w-80 h-80 bg-yellow-400/10 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-yellow-500/10 rounded-full blur-3xl"></div>
    </div>
    <div class="container mx-auto px-4 relative z-10 text-center text-white">
      <h1 class="text-4xl md:text-5xl font-bold mb-4">
        Our <span class="bg-gradient-to-r from-yellow-400 to-yellow-600 bg-clip-text text-transparent">Services</span>
      </h1>
      <p class="text-xl text-blue-200 max-w-2xl mx-auto">
        Comprehensive travel services to make your journey unforgettable
      </p>
    </div>
  </section>

  <!-- Services Grid -->
  <section class="py-16">
    <div class="container mx-auto px-4">
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        @for (service of services; track service.title) {
          <div class="bg-white rounded-2xl shadow-lg p-8 text-center hover:shadow-2xl transition-all duration-300 hover:-translate-y-1 group">
            <div class="text-6xl mb-4 group-hover:scale-110 transition-transform duration-300">
              {{ service.icon }}
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">{{ service.title }}</h3>
            <p class="text-gray-600">{{ service.description }}</p>
          </div>
        }
      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="py-16 bg-gradient-to-r from-blue-900 to-blue-800 relative overflow-hidden">
    <div class="absolute inset-0 overflow-hidden">
      <div class="absolute -top-40 -right-40 w-80 h-80 bg-yellow-400/10 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-yellow-500/10 rounded-full blur-3xl"></div>
    </div>
    <div class="container mx-auto px-4 relative z-10 text-center text-white">
      <h2 class="text-3xl font-bold mb-4">Need Help Planning Your Trip?</h2>
      <p class="text-blue-200 mb-8">Our travel experts are here to assist you</p>
      <a routerLink="/bookings"
         class="px-10 py-4 bg-gradient-to-r from-yellow-500 to-yellow-600 text-blue-900 font-bold rounded-lg shadow-lg shadow-yellow-500/30 hover:shadow-yellow-500/50 hover:scale-105 transition-all duration-300 inline-block">
        Get Started
      </a>
    </div>
  </section>
</div>
